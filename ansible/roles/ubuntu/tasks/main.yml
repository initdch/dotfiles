---
- name: Upgrade installed packages
  apt: upgrade=yes

- name: Install Snap Packages
  snap: name={{ snap_packages }} classic=yes

- name: Setup gitconfig
  template:
    dest: ~/.gitconfig
    src: ../template/gitconfig.j2
    force: yes

- name: Remove useless items
  file:
    path: '{{ item }}'
    state: absent
  with_items:
    - '~/Templates'
    - '~/Public'
    - '~/examples.desktop'
