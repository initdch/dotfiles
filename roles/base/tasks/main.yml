---
- name: Upgrade installed packages
  become: yes
  become_user: root
  become_method: sudo
  apt: upgrade=yes

- name: Install APT Packages
  become: yes
  become_user: root
  become_method: sudo
  apt: pkg={{ apt_packages }} state=latest update_cache=yes

- name: Install Snap Packages
  become: yes
  become_user: root
  become_method: sudo
  snap: name={{ snap_packages }} classic=yes


- name: Remove useless items
  file:
    path: '{{ item }}'
    state: absent
  with_items:
    - '~/Templates'
    - '~/Public'
    - '~/examples.desktop'
