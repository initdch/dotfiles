- name: Remove old Docker
  become: yes
  become_user: root
  become_method: sudo
  apt:
    name: ['docker', 'docker-engine', 'docker.io', 'containerd', 'runc']
    state: absent

- name: Install prerequisite
  become: yes
  become_user: root
  become_method: sudo
  apt:
    name: ['apt-transport-https', 'ca-certificates', 'curl', 'gnupg-agent', 'software-properties-common']
    state: present

- name: Add Docker GPG Key
  become: yes
  become_user: root
  become_method: sudo
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repoistory
  become: yes
  become_user: root
  become_method: sudo
  apt_repository:
    repo: 'deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable'
    state: present

- name: Install Docker
  become: yes
  become_user: root
  become_method: sudo
  apt:
    update_cache: yes
    name: ['docker-ce', 'docker-ce-cli', 'containerd.io']
    state: latest

- name: Create Docker group
  become: yes
  become_user: root
  become_method: sudo
  group:
    name: docker
    state: present

- name: Add Current User to Docker group
  become: yes
  become_user: root
  become_method: sudo
  user:
    name: "{{ lookup('env','USER') }}"
    groups: docker
    append: yes

- name: Start Docker Service
  become: yes
  become_user: root
  become_method: sudo
  service:
    name: docker
    state: started
